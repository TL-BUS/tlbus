tlbusnet_obs_image:
  stage: images
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build --pull --target tlbusnet-runtime-obs -t "$CI_REGISTRY_IMAGE/tlbusnet-obs:$CI_COMMIT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE/tlbusnet-obs:$CI_COMMIT_SHA"
  rules:
    - if: "$CI_COMMIT_BRANCH"
    - if: "$CI_COMMIT_TAG"

